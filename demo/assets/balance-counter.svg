<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 80" fill="none">
  <!-- Balance Counter: Displays a creator's accrued royalty balance.
       The number animates (ticks up) via GSAP .to() on textContent.
       Three variants needed for A, B, C — this is the template. -->

  <defs>
    <linearGradient id="counterBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(240,185,11,0.4)"/>
      <stop offset="100%" stop-color="rgba(240,185,11,0.1)"/>
    </linearGradient>
  </defs>

  <!-- Container -->
  <rect x="1" y="1" width="218" height="78" rx="6"
        fill="rgba(13,17,23,0.9)" stroke="url(#counterBorder)" stroke-width="1"/>

  <!-- Creator label -->
  <text class="creator-label" x="14" y="22"
        font-family="'JetBrains Mono', monospace" font-size="9"
        fill="#94a3b8" letter-spacing="1">
    CREATOR A
  </text>

  <!-- Address (truncated) -->
  <text class="creator-addr" x="14" y="36"
        font-family="'JetBrains Mono', monospace" font-size="8"
        fill="#58a6ff" opacity="0.7">
    0x7ca0...56b8
  </text>

  <!-- Balance value (the animated number) -->
  <text class="counter-value" x="14" y="60"
        font-family="'JetBrains Mono', monospace" font-size="22" font-weight="700"
        fill="#f0b90b">
    0.0000
  </text>

  <!-- Unit -->
  <text x="160" y="60"
        font-family="'JetBrains Mono', monospace" font-size="11"
        fill="#94a3b8">
    PROS
  </text>

  <!-- Depth indicator -->
  <rect x="186" y="8" width="26" height="16" rx="3"
        fill="rgba(45,212,191,0.1)" stroke="rgba(45,212,191,0.3)" stroke-width="0.8"/>
  <text x="199" y="19" text-anchor="middle"
        font-family="'JetBrains Mono', monospace" font-size="7" fill="#2dd4bf">
    L3
  </text>
</svg>
