<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" fill="none">
  <!-- Phase 2 Teaser: Closing vision frame.
       "Phase 2: Agents compose Skills — with built-in economic incentives."
       Shows multiple agent icons connected to the expanded tree,
       implying autonomous agents discovering and paying for skills. -->

  <defs>
    <linearGradient id="teaserGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="40%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="teaserAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0b90b"/>
      <stop offset="100%" stop-color="#ff6b35"/>
    </linearGradient>
    <filter id="teaserGlow" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur stdDeviation="3" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Subtitle (top) -->
  <text class="teaser-sub" x="300" y="30" text-anchor="middle"
        font-family="'JetBrains Mono', monospace" font-size="11"
        fill="#94a3b8" letter-spacing="3" opacity="0.8">
    WHAT COMES NEXT
  </text>

  <!-- Main headline -->
  <text class="teaser-headline" x="300" y="70" text-anchor="middle"
        font-family="'Inter', 'Helvetica', sans-serif" font-size="28" font-weight="800"
        fill="url(#teaserGrad)" letter-spacing="-0.5" filter="url(#teaserGlow)">
    Phase 2: Agents Compose Skills
  </text>

  <!-- Sub-headline -->
  <text class="teaser-desc" x="300" y="100" text-anchor="middle"
        font-family="'Inter', 'Helvetica', sans-serif" font-size="14"
        fill="#e2e8f0" opacity="0.9">
    Autonomous agents discover, invoke, and pay for skills —
  </text>
  <text class="teaser-desc2" x="300" y="120" text-anchor="middle"
        font-family="'Inter', 'Helvetica', sans-serif" font-size="14"
        fill="url(#teaserAccent)">
    with built-in economic incentives at every layer.
  </text>

  <!-- Visual: 3 small agent hexagons connected to a mini skill-tree silhouette -->
  <!-- Agent 1 (left) -->
  <polygon points="100,160 112,154 124,160 124,172 112,178 100,172"
           stroke="#8b5cf6" stroke-width="1.2" fill="rgba(139,92,246,0.1)"/>
  <circle cx="112" cy="166" r="2" fill="#a78bfa"/>

  <!-- Agent 2 (center) -->
  <polygon points="288,155 300,149 312,155 312,167 300,173 288,167"
           stroke="#8b5cf6" stroke-width="1.2" fill="rgba(139,92,246,0.1)"/>
  <circle cx="300" cy="161" r="2" fill="#a78bfa"/>

  <!-- Agent 3 (right) -->
  <polygon points="476,160 488,154 500,160 500,172 488,178 476,172"
           stroke="#8b5cf6" stroke-width="1.2" fill="rgba(139,92,246,0.1)"/>
  <circle cx="488" cy="166" r="2" fill="#a78bfa"/>

  <!-- Connection lines from agents to an implied shared skill layer -->
  <line x1="112" y1="154" x2="200" y2="140" stroke="#6366f1" stroke-width="0.8"
        stroke-dasharray="4 3" opacity="0.4"/>
  <line x1="300" y1="149" x2="300" y2="138" stroke="#6366f1" stroke-width="0.8"
        stroke-dasharray="4 3" opacity="0.4"/>
  <line x1="488" y1="154" x2="400" y2="140" stroke="#6366f1" stroke-width="0.8"
        stroke-dasharray="4 3" opacity="0.4"/>

  <!-- Implied skill nodes (tiny, abstract) -->
  <rect x="190" y="132" width="20" height="12" rx="2" fill="none"
        stroke="#2dd4bf" stroke-width="0.8" opacity="0.5"/>
  <rect x="290" y="128" width="20" height="12" rx="2" fill="none"
        stroke="#2dd4bf" stroke-width="0.8" opacity="0.5"/>
  <rect x="390" y="132" width="20" height="12" rx="2" fill="none"
        stroke="#2dd4bf" stroke-width="0.8" opacity="0.5"/>

  <!-- Pharos + Cascade branding (bottom) -->
  <text x="300" y="195" text-anchor="middle"
        font-family="'JetBrains Mono', monospace" font-size="9"
        fill="rgba(148,163,184,0.5)" letter-spacing="2">
    CASCADE × PHAROS · SKILL-TO-AGENT DUAL CASCADE HACKATHON
  </text>
</svg>
