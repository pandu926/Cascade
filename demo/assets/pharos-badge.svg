<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 56" fill="none">
  <!-- Pharos Badge: "Live on Pharos Mainnet" branding element.
       Used in closing frame. Clean, minimal, authoritative. -->

  <defs>
    <linearGradient id="pharosBadgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="50%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="pharosBadgeGlow" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur stdDeviation="2" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Badge container -->
  <rect x="1" y="1" width="278" height="54" rx="27"
        fill="rgba(13,17,23,0.9)" stroke="url(#pharosBadgeGrad)" stroke-width="1.5"
        filter="url(#pharosBadgeGlow)"/>

  <!-- Live pulse dot -->
  <circle class="live-pulse" cx="24" cy="28" r="6" fill="#10b981" opacity="0.9"/>
  <circle class="live-pulse-ring" cx="24" cy="28" r="6" fill="none"
          stroke="#10b981" stroke-width="1.5" opacity="0.4"/>

  <!-- Text -->
  <text x="42" y="24" font-family="'JetBrains Mono', monospace"
        font-size="9" fill="#94a3b8" letter-spacing="1.5">
    DEPLOYED &amp; VERIFIED
  </text>
  <text x="42" y="40" font-family="'Inter', 'Helvetica', sans-serif"
        font-size="13" font-weight="700" fill="#e2e8f0" letter-spacing="0.5">
    Live on Pharos Mainnet
  </text>

  <!-- Chain ID chip -->
  <rect x="222" y="16" width="46" height="24" rx="4" fill="rgba(45,212,191,0.1)"
        stroke="rgba(45,212,191,0.3)" stroke-width="0.8"/>
  <text x="245" y="32" text-anchor="middle" font-family="'JetBrains Mono', monospace"
        font-size="9" fill="#2dd4bf">
    1672
  </text>
</svg>
